{% extends "admin/base.html" %}

{% block extrahead %}
{{ block.super }}

<style>
/* MODAL BACKDROP */
#tempPasswordModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}

/* MODAL CONTENT */
#tempPasswordModal .modal-content {
  background: #111827;
  padding: 28px;
  border-radius: 12px;
  width: 580px;
  max-width: 92vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* HEADER */
.modal-title {
  margin: 0 0 10px;
  font-size: 18px;
  color: #f9fafb;
}

/* WARNING BOX */
.modal-warning {
  color: #fca5a5;
  font-size: 13px;
  margin-bottom: 16px;
  padding: 10px 12px;
  background: #450a0a;
  border: 1px solid #991b1b;
  border-radius: 6px;
}

/* TABLE */
#tempPasswordModal table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border-radius: 8px;
  overflow: hidden;
}

#tempPasswordModal thead tr {
  background: #1f2937;
  border-bottom: 2px solid #374151;
}

#tempPasswordModal th {
  padding: 10px 8px;
  text-align: left;
  color: #d1d5db;
}

#tempPasswordModal tbody tr {
  border-bottom: 1px solid #1f2937;
}

#tempPasswordModal tbody tr:hover {
  background: #1a2235;
}

/* CELLS */
.cell-name {
  padding: 9px 8px;
  font-weight: 600;
  color: #f9fafb;
}

.cell-email {
  padding: 9px 8px;
  color: #9ca3af;
  font-size: 12px;
}

/* PASSWORD + BUTTON WRAP */
.password-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* PASSWORD BADGE */
.password-badge {
  font-family: monospace;
  font-weight: 700;
  color: #f9fafb;
  background: #1f2937;
  padding: 6px 10px;
  border-radius: 6px;
}

/* COPY BUTTON */
.copy-btn {
  padding: 4px 12px;
  background: #374151;
  color: #d1d5db;
  border: 1px solid #4b5563;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}

.copy-btn:hover {
  background: #4b5563;
}

/* FOOTER */
.modal-footer {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* PRIMARY BUTTON */
.btn-primary {
  padding: 8px 18px;
  background: #1a56db;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

/* SECONDARY BUTTON */
.btn-secondary {
  padding: 8px 18px;
  background: #374151;
  color: #d1d5db;
  border: 1px solid #4b5563;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
</style>

<!-- MODAL -->
<div id="tempPasswordModal">
  <div class="modal-content">
    
    <h3 class="modal-title">🔑 Temporary Passwords</h3>

    <div class="modal-warning">
      ⚠️ These passwords will <strong>not be shown again</strong>. Copy them before closing this window.
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Temp Password</th>
        </tr>
      </thead>
      <tbody id="tempPasswordRows"></tbody>
    </table>

    <div class="modal-footer">
      <button class="btn-primary" onclick="copyAllPasswords(this)">
        Copy All
      </button>
      <button class="btn-secondary" onclick="closeTempModal()">
        Close
      </button>
    </div>

  </div>
</div>

<script>
function showTempPasswordModal(users) {
  const tbody = document.getElementById('tempPasswordRows');
  tbody.innerHTML = '';

  users.forEach((u, i) => {
    tbody.innerHTML += `
      <tr>
        <td class="cell-name">${u.name}</td>
        <td class="cell-email">${u.email}</td>
        <td>
          <div class="password-wrap">
            <span class="password-badge" id="pw-${i}">${u.password}</span>
            <button class="copy-btn" onclick="copyOne('pw-${i}', this)">Copy</button>
          </div>
        </td>
      </tr>
    `;
  });

  document.getElementById('tempPasswordModal').style.display = 'flex';
}

function copyOne(id, btn) {
  const text = document.getElementById(id).textContent;

  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.style.color = '#6ee7b7';
    btn.style.borderColor = '#065f46';

    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.style.color = '#d1d5db';
      btn.style.borderColor = '#4b5563';
    }, 2000);
  });
}

function copyAllPasswords(btn) {
  const rows = document.querySelectorAll('#tempPasswordRows tr');
  let text = 'RIMS Temporary Passwords\n' + '='.repeat(40) + '\n';

  rows.forEach(row => {
    const cells = row.querySelectorAll('td');
    text += `${cells[0].textContent.trim()} (${cells[1].textContent.trim()}): ${cells[2].innerText.trim()}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ All Copied!';
    setTimeout(() => btn.textContent = 'Copy All', 2000);
  });
}

function closeTempModal() {
  document.getElementById('tempPasswordModal').style.display = 'none';
}

/* CLICK OUTSIDE TO CLOSE */
document.getElementById('tempPasswordModal').addEventListener('click', function(e) {
  if (e.target.id === 'tempPasswordModal') {
    closeTempModal();
  }
});
</script>

{% endblock %}
