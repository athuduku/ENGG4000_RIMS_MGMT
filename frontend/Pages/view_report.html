{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Reports</title>
    <link rel="icon" href="{% static 'assets/IBE-logo.png' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/reports.css' %}">
</head>

<body>
    <div class="dashboard-layout">
        <div class="sidebar" id="sidebar">
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            
            <div class="logo-area">
                <img src="{% static 'assets/IBE-logo.png' %}" alt="Logo">
            </div>

            <ul>
                <li><a href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a></li>
                <li><a href="{% url 'reports_list' %}"><i class="bi bi-bar-chart"></i> <span>Reports</span></a></li>
                <li><a href="{% url 'add_publication' %}"><i class="bi bi-file-earmark-plus"></i> <span>Add Publication</span></a></li>
                <li><a href="{% url 'form' %}"><i class="bi bi-file-earmark-plus"></i> <span>Add Papers</span></a></li>
                <li><a href="{% url 'view_reports' %}"><i class="bi bi-folder2-open"></i> <span>View Papers</span></a></li>
                <li><a href="{% url 'home' %}"><i class="bi bi-house-door"></i> <span>Home</span></a></li>
                <li><a href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></a></li>
            </ul>
        </div>

        <div class="dashboard-main">
            <div class="reports-container">
                <h2 class="reports-header">Reports</h2>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('my-reports')">My Reports</button>
                    <button class="tab-btn" onclick="switchTab('all-reports')">All Reports</button>
                </div>

                <div id="my-reports" class="tab-content active">
                    <div class="reports-grid" id="myReportsList"></div>
                    <div id="noMyReports" class="no-reports" style="display: none;">
                        <i class="bi bi-file-earmark-pdf"></i>
                        <p>No reports yet</p>
                        <p><a href="{% url 'form' %}">Upload your first report</a></p>
                    </div>
                </div>

                <div id="all-reports" class="tab-content">
                    <div class="reports-grid" id="allReportsList"></div>
                    <div id="noAllReports" class="no-reports" style="display: none;">
                        <i class="bi bi-file-earmark-pdf"></i>
                        <p>No reports available</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/dashboard.js' %}"></script>
    <script src="{% static 'js/reports.js' %}"></script>
</body>
</html>
