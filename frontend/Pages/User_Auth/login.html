{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="icon" href="{% static 'assets/IBE-logo.png' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>
  <div class="navbar">
    <img src="{% static 'assets/IBE-logo.png' %}" alt="IBE Logo">
    <ul>
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'signup' %}">Sign Up</a></li>
    </ul>
  </div>

  <div class="container">
    <h2>Login to your Account</h2>
    <p class="subtitle">Enter your credentials below to continue</p>

    <form id="loginForm" method="POST">
      {% csrf_token %}
      <label>Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>

      <!-- ✅ Pass dashboard URL to JS -->
      <button 
        type="submit" 
        class="button"
        data-dashboard-url="{% url 'dashboard' %}">
        Login
      </button>
    </form>

    <div class="divider"></div>

    <p class="bottom-text">
      Forgot your password? <a href="{% url 'forgot_pass' %}">Reset</a> <br><br>
      Don’t have an account? <a href="{% url 'signup' %}">Sign Up</a>
    </p>
  </div>

  <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
