{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
   <link rel="icon" type="image/png" sizes="32x32" href="{% static 'assets/IBE-logo.png' %}">
</head>
<body>
  <div class="navbar">
    <img src="{% static 'assets/IBE-logo.png' %}" alt="IBE Logo" class="logo">    
    <ul>
      <li><a href="{% url 'index' %}">Home</a></li>
      <li><a  href="{% url 'signup' %}">Sign Up</a></li>
    </ul>
  </div>

  <div class="form-container">
    <h2>Login to your Account</h2>
    <form id="loginForm">
      <label>Email:</label>
      <input type="email" id="email" required>

      <label>Password:</label>
      <input type="password" id="password" required>

      <p style="text-align:center;">Forgot your password? 
      <a href="{% url 'forgot_pass' %}" style="color:#1abc9c;">Reset</a>
      </p>

      <button type="submit" class="button">Login</button>
    </form>

    
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      let users = JSON.parse(localStorage.getItem("users")) || [];

      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        localStorage.setItem("loggedInUser", JSON.stringify(user));
        alert("Login successful!");
        window.location.href = "{% url 'index' %}";
      } else {
        alert("Invalid credentials!");
      }
    });
  </script>
</body>
</html>
