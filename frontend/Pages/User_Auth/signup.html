{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'assets/IBE-logo.png' %}">
</head>
<body>
  <div class="navbar">
    <img src="{% static 'assets/IBE-logo.png' %}" alt="IBE Logo" class="logo">
    <ul>
      <li><a href="{% url 'index' %}">Home</a></li>
      <li><a href="{% url 'login' %}">Login</a></li>
    </ul>
  </div>

  <div class="form-container">
    <h2>Create Account</h2>
    <form id="signupForm">
      <label>Email:</label>
      <input type="email" id="email" required>

      <label>Password:</label>
      <input type="password" id="password" required>

      <label>Confirm Password:</label>
      <input type="password" id="confirmPassword" required>

      <button type="submit" class="button">Sign Up</button>
    </form>
    <p style="text-align:center;">Already have an account? 
      <a href="{% url 'login' %}" style="color:#1abc9c;">Login</a>
    </p>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      let users = JSON.parse(localStorage.getItem("users")) || [];

      if (users.find(u => u.email === email)) {
        alert("Account already exists! Please login.");
        return;
      }

      users.push({ email, password });
      localStorage.setItem("users", JSON.stringify(users));

      alert("Signup successful! Redirecting to login...");
      window.location.href = "{% url 'login' %}";
    });
  </script>
</body>
</html>
